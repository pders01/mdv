<h1>Wiki Links</h1>
<p>Plain wiki link: <a class="internal new" href="#/page/other_page">Other Page</a> points to a related note.</p>
<p>Aliased wiki link: <a class="internal new" href="#/page/project_roadmap">the roadmap</a> uses a custom label.</p>
<p>Inline mix with regular links: see <a class="internal new" href="#/page/index">Index</a> or visit <a href="https://example.com">the docs</a>.</p>
<p>Multiple in a paragraph: refer to <a class="internal new" href="#/page/concept_a">Concept A</a>, <a class="internal new" href="#/page/concept_b">Concept B</a>, or <a class="internal new" href="#/page/concept_c">Concept C</a> for details.</p>
