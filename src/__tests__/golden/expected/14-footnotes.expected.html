<h1>Footnotes</h1>
<p>A paragraph with a single footnote<sup><a href="#user-content-fn-one" id="user-content-fnref-one" data-footnote-ref aria-describedby="footnote-label">1</a></sup> in the middle.</p>
<p>A second paragraph with two<sup><a href="#user-content-fn-two" id="user-content-fnref-two" data-footnote-ref aria-describedby="footnote-label">2</a></sup> footnotes<sup><a href="#user-content-fn-three" id="user-content-fnref-three" data-footnote-ref aria-describedby="footnote-label">3</a></sup> in it.</p>
<p>Repeat references work too: see <sup><a href="#user-content-fn-one" id="user-content-fnref-one-2" data-footnote-ref aria-describedby="footnote-label">1</a></sup> again.</p>
<h2>Definitions</h2>
<section data-footnotes class="footnotes"><h2 class="sr-only" id="footnote-label">Footnotes</h2>
<ol>
<li id="user-content-fn-one">
<p>First footnote — short. <a href="#user-content-fnref-one" data-footnote-backref="" aria-label="Back to reference 1" class="data-footnote-backref">↩</a> <a href="#user-content-fnref-one-2" data-footnote-backref="" aria-label="Back to reference 1-2" class="data-footnote-backref">↩<sup>2</sup></a></p>
</li>
<li id="user-content-fn-two">
<p>Second one. <a href="#user-content-fnref-two" data-footnote-backref="" aria-label="Back to reference 2" class="data-footnote-backref">↩</a></p>
</li>
<li id="user-content-fn-three">
<p>Third footnote with <strong>inline</strong> <em>formatting</em> and a <a href="https://example.com">link</a>. <a href="#user-content-fnref-three" data-footnote-backref="" aria-label="Back to reference 3" class="data-footnote-backref">↩</a></p>
</li>
</ol>
</section>
